<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
body{margin:0;background:#000;overflow:hidden;touch-action:none;font-family:Arial}
canvas{display:block}
#u{position:fixed;top:0;width:100%;color:#fff;text-align:center;z-index:1}
#xp{width:100%;height:8px;background:#111}
#f{height:100%;background:linear-gradient(90deg,#0f8,#0af);width:0%;transition:width.3s}
#s{padding:8px;background:rgba(0,0,0,.7);font-size:14px}
#sc{font-size:28px;color:#0af;font-weight:bold}
#start{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;z-index:9}
#btn{font-size:22px;padding:20px 50px;background:#0af;border:0;border-radius:10px;color:#fff}
#up{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;flex-direction:column;justify-content:center;align-items:center;color:#fff;z-index:8}
#over{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;flex-direction:column;justify-content:center;align-items:center;color:#fff;z-index:9}
.card{background:#111;border:2px solid #0af;border-radius:10px;padding:15px;margin:10px;width:80%;max-width:300px;text-align:center}
.card h3{color:#0af;margin:0 0 5px 0}
.card p{margin:0 0 10px 0;opacity:.8;font-size:14px}
.card button{background:#0af;border:0;padding:10px 20px;border-radius:5px;color:#fff;font-weight:bold}
#wave{position:fixed;top:50px;width:100%;text-align:center;color:#f55;font-size:18px;font-weight:bold;opacity:0;transition:opacity.5s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="u">
<div id="xp"><div id="f"></div></div>
<div id="s"><div id="sc">0</div>LVL <span id="lv">1</span> | HP: <span id="hp">100</span> | DMG: <span id="dmg">10</span></div>
</div>
<div id="wave">DIFICULDADE AUMENTOU!</div>
<div id="start">
<h1 style="color:#0af;font-size:36px">SQUARE SHOT</h1>
<p style="opacity:.7">Toque na tela pra mover</p>
<button id="btn" onclick="startGame()">JOGAR</button>
</div>
<div id="up">
<h2 style="color:#0af">LEVEL UP!</h2>
<p>Escolha 1 upgrade:</p>
<div id="cards"></div>
</div>
<div id="over">
<h1 style="color:#f55;font-size:42px;margin:0">VOCÊ MORREU</h1>
<p style="font-size:20px;margin:20px 0">Score: <span id="finalS">0</span></p>
<p style="opacity:.7;margin:0 0 30px 0">Chegou no LVL <span id="finalL">1</span></p>
<button id="again" onclick="resetGame()" style="font-size:22px;padding:20px 50px;background:#0af;border:0;border-radius:10px;color:#fff">JOGAR NOVAMENTE</button>
</div>
<script>
let c=document.getElementById('c'),x=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;
let p,e=[],b=[],g=[],s=0,lv=1,xp=0,xn=5,on=0,pa=0,t={a:0,x:0,y:0},rgInt;

let upgrades=[
{n:'Dano +5',d:'Aumenta o dano do tiro',f:()=>{p.d+=5;dmg.textContent=p.d}},
{n:'HP Max +20',d:'Vida máxima e cura 20 HP',f:()=>{p.m+=20;p.h+=20;hp.textContent=~~p.h}},
{n:'Velocidade +1',d:'Move mais rápido',f:()=>{p.sp+=1}},
{n:'Cadência +1',d:'Atira mais rápido',f:()=>{p.fr=Math.max(2,p.fr-1)}},
{n:'Tiro Duplo',d:'Atira 2 de uma vez',f:()=>{p.ms++}},
{n:'Regen +1',d:'Recupera 1 HP por seg',f:()=>{p.rg++}}
];

c.ontouchstart=e=>{t.a=1;t.x=e.touches[0].clientX;t.y=e.touches[0].clientY};
c.ontouchmove=e=>{t.x=e.touches[0].clientX;t.y=e.touches[0].clientY};
c.ontouchend=()=>{t.a=0};
window.onresize=()=>{c.width=innerWidth;c.height=innerHeight};

window.resetGame=function(){
clearInterval(rgInt);
e=[];b=[];g=[];s=0;lv=1;xp=0;xn=5;pa=0;on=0;
sc.textContent='0';lv.textContent='1';hp.textContent='100';dmg.textContent='10';f.style.width='0%';
over.style.display='none';up.style.display='none';start.style.display='flex';
}

window.startGame=function(){
clearInterval(rgInt);
e=[];b=[];g=[];s=0;lv=1;xp=0;xn=5;pa=0;
p={x:c.width/2,y:c.height/2,h:100,m:100,d:10,sp:4,fr:7,fc:0,ms:1,rg:0};
sc.textContent='0';lv.textContent='1';hp.textContent='100';dmg.textContent='10';f.style.width='0%';
start.style.display='none';over.style.display='none';up.style.display='none';
on=1;
rgInt=setInterval(()=>{if(on&&!pa&&p.rg){p.h=Math.min(p.m,p.h+p.rg);hp.textContent=~~p.h}},1000);
loop();
}

function gameOver(){
on=0;pa=1;
clearInterval(rgInt);
finalS.textContent=s;finalL.textContent=lv;
over.style.display='flex';
}

function levelUp(){
pa=1;on=0;
wave.style.opacity=1;setTimeout(()=>{wave.style.opacity=0},1500);
cards.innerHTML='';
let opts=[...upgrades].sort(()=>.5-Math.random()).slice(0,3);
opts.forEach(u=>{
let div=document.createElement('div');
div.className='card';
div.innerHTML=`<h3>${u.n}</h3><p>${u.d}</p><button>PEGAR</button>`;
div.querySelector('button').onclick=()=>{u.f();pa=0;on=1;up.style.display='none';loop()};
cards.appendChild(div);
});
up.style.display='flex';
}

function loop(){
if(!on||pa)return;
x.fillStyle='rgba(0,0,0,.3)';x.fillRect(0,0,c.width,c.height);
if(t.a){let dx=t.x-p.x,dy=t.y-p.y,d=Math.hypot(dx,dy);if(d>5){p.x+=dx/d*p.sp;p.y+=dy/d*p.sp;p.x=Math.max(20,Math.min(c.width-20,p.x));p.y=Math.max(20,Math.min(c.height-20,p.y))}}
if(Math.random()<.025+lv*.002)e.push({x:Math.random()*c.width,y:-30,h:10+(lv-1)*5,mh:10+(lv-1)*5,s:1.2+lv*.15});
p.fc++;if(e.length&&p.fc>=p.fr){p.fc=0;let n=e[0],d=9999;for(let o of e){let q=Math.hypot(o.x-p.x,o.y-p.y);if(q<d){n=o;d=q}}let a=Math.atan2(n.y-p.y,n.x-p.x);for(let i=0;i<p.ms;i++){let sa=a+(i-(p.ms-1)/2)*.2;b.push({x:p.x,y:p.y,vx:Math.cos(sa)*8,vy:Math.sin(sa)*8})}}
b=b.filter(u=>{u.x+=u.vx;u.y+=u.vy;x.fillStyle='#fa0';x.fillRect(u.x-3,u.y-3,6,6);return u.x>-10&&u.x<c.width+10&&u.y>-10&&u.y<c.height+10});
e=e.filter(o=>{let a=Math.atan2(p.y-o.y,p.x-o.x);o.x+=Math.cos(a)*o.s;o.y+=Math.sin(a)*o.s;for(let i=b.length-1;i>=0;i--)if(Math.abs(b[i].x-o.x)<15&&Math.abs(b[i].y-o.y)<15){b.splice(i,1);o.h-=p.d;if(o.h<=0){s+=10+~~(lv*2);g.push({x:o.x,y:o.y,l:600});sc.textContent=s;return 0}}if(Math.abs(o.x-p.x)<30&&Math.abs(o.y-p.y)<30){p.h-=12+lv;hp.textContent=Math.max(0,~~p.h);if(p.h<=0){gameOver();return 0}return 0}
x.fillStyle='#f05';x.fillRect(o.x-15,o.y-15,30,30);
x.fillStyle='rgba(0,0,0,.5)';x.fillRect(o.x-15,o.y-22,30,4);
x.fillStyle='#0f0';x.fillRect(o.x-15,o.y-22,30*(o.h/o.mh),4);
return 1});
g=g.filter(j=>{j.l--;if(j.l<=0)return 0;let d=Math.hypot(j.x-p.x,j.y-p.y);if(d<120){let a=Math.atan2(p.y-j.y,p.x-j.x);j.x+=Math.cos(a)*5;j.y+=Math.sin(a)*5}if(d<25){xp++;if(xp>=xn){xp=0;lv++;xn=~~(xn*1.4);lv.textContent=lv;levelUp();return 0}f.style.width=xp/xn*100+'%';return 0}x.fillStyle='#0f8';x.beginPath();x.arc(j.x,j.y,6,0,7);x.fill();return 1});
x.fillStyle='#0af';x.fillRect(p.x-20,p.y-20,40,40);
x.fillStyle='rgba(255,0,0,.3)';x.fillRect(p.x-20,p.y+25,40,4);
x.fillStyle='#0f0';x.fillRect(p.x-20,p.y+25,40*(p.h/p.m),4);
requestAnimationFrame(loop)}
</script>
</body>
</html>
